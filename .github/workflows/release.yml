name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install PC/SC build dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev pkg-config

      - name: Run tests
        run: |
          go test ./...
          go vet ./...

      - name: Build release binaries
        run: |
          mkdir -p dist
          build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          for os in linux windows darwin; do
            for arch in amd64 arm64; do
              ext=""
              if [ "$os" = "windows" ]; then
                ext=".exe"
              fi
              out="dist/piv-${{ github.ref_name }}-${os}-${arch}${ext}"
              GOOS=$os GOARCH=$arch go build -ldflags "-X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }} -X main.buildDate=${build_date}" -o "$out" ./cmd/piv
            done
          done

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
